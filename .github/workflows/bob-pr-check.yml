name: 🤖 BOB PR Check

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
      - master
      - develop

jobs:
  bob-analysis:
    name: BOB Code Analysis
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 📦 Install BOB dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
        working-directory: .
      
      - name: 🤖 Run BOB Analysis
        id: bob-check
        run: |
          echo "🤖 BOB iniciando análise do Pull Request..."
          
          # Cria diretório para relatórios
          mkdir -p bob-reports
          
          # Executa análise do BOB
          python -m bob.main \
            --pr-id ${{ github.event.pull_request.number }} \
            --project-id ${{ github.repository }} \
            --github-url ${{ github.server_url }} \
            --github-token ${{ secrets.GITHUB_TOKEN }} \
            --config config/ibm_policies.yaml \
            --output bob-reports/bob-report.json \
            || echo "BOB_FAILED=true" >> $GITHUB_ENV
          
          echo "✅ Análise concluída!"
        continue-on-error: true
      
      - name: 📊 Upload BOB Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bob-analysis-report
          path: bob-reports/
          retention-days: 30
      
      - name: 📝 Comment PR with Results
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            
            let reportContent = '## 🤖 BOB Analysis Report\n\n';
            
            try {
              const report = JSON.parse(fs.readFileSync('bob-reports/bob-report.json', 'utf8'));
              
              const critical = report.issues.filter(i => i.severity === 'CRITICAL').length;
              const high = report.issues.filter(i => i.severity === 'HIGH').length;
              const medium = report.issues.filter(i => i.severity === 'MEDIUM').length;
              const low = report.issues.filter(i => i.severity === 'LOW').length;
              
              reportContent += `### 📊 Summary\n\n`;
              reportContent += `- 🔴 **Critical**: ${critical}\n`;
              reportContent += `- 🟠 **High**: ${high}\n`;
              reportContent += `- 🟡 **Medium**: ${medium}\n`;
              reportContent += `- 🟢 **Low**: ${low}\n`;
              reportContent += `- 📊 **Total Issues**: ${report.issues.length}\n\n`;
              
              if (critical > 0) {
                reportContent += `### 🔴 Critical Issues (PR Blocked)\n\n`;
                const criticalIssues = report.issues.filter(i => i.severity === 'CRITICAL').slice(0, 5);
                criticalIssues.forEach((issue, idx) => {
                  reportContent += `${idx + 1}. **${issue.message}**\n`;
                  reportContent += `   - File: \`${issue.file_path}:${issue.line_number}\`\n`;
                  if (issue.description) {
                    reportContent += `   - ${issue.description}\n`;
                  }
                  reportContent += `\n`;
                });
                
                if (critical > 5) {
                  reportContent += `\n_... and ${critical - 5} more critical issues_\n\n`;
                }
                
                reportContent += `\n❌ **This PR is blocked due to critical issues.**\n`;
              } else {
                reportContent += `\n✅ **No critical issues found. PR can proceed to human review.**\n`;
              }
              
            } catch (error) {
              reportContent += `⚠️ Could not parse BOB report: ${error.message}\n`;
            }
            
            reportContent += `\n---\n`;
            reportContent += `📋 Full report available in workflow artifacts.\n`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: reportContent
            });
      
      - name: ❌ Fail if Critical Issues Found
        if: env.BOB_FAILED == 'true'
        run: |
          echo "❌ BOB found critical issues. PR is blocked."
          exit 1

# Made with Bob
